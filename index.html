<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Menu Board</title>

<script src="https://cdn.tailwindcss.com"></script>

<link
href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;600&display=swap"
rel="stylesheet">

<style>
.font-serif {
    font-family: 'Cormorant Garamond', serif;
}

.font-sans {
    font-family: 'Inter', sans-serif;
}

body {
    background: #111;
}
</style>
</head>

<body class="text-stone-100 font-sans min-h-screen overflow-hidden">

<!-- Published Google Sheet -->
<script>
const TSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vTdctD1zk3cv8cjGUJIk6tMUG91VdsveUXPtQz8cMqB-W5lyipJFc286R1VuNppsO5_nLSNerE3x-TF/pub?gid=0&single=true&output=tsv';

const REFRESH_INTERVAL = 30000;
</script>

<!-- APP -->
<div class="w-screen h-screen bg-[#0d0d0c] p-12 flex flex-col">

<!-- HEADER -->
<div class="text-center">

<h1
id="menu-title"
class="font-serif text-6xl uppercase tracking-widest font-semibold text-stone-100">

Aura Artisanal

</h1>

<p class="mt-3 text-xs uppercase tracking-[0.3em] text-amber-500">

Sip • Savor • Gather

</p>

<div class="w-24 h-px bg-amber-500/40 mx-auto mt-4"></div>

</div>

<!-- CONTENT -->

<div
class="grid grid-cols-2 gap-16 px-6 my-auto">

<!-- LEFT -->

<div>

<h2
id="cat-title-1"
class="font-serif text-3xl italic text-amber-500 border-b border-stone-800 pb-2">

Loading...

</h2>

<div
id="category-1-items"
class="space-y-6 mt-6">

</div>

</div>

<!-- RIGHT -->

<div>

<h2
id="cat-title-2"
class="font-serif text-3xl italic text-amber-500 border-b border-stone-800 pb-2">

Loading...

</h2>

<div
id="category-2-items"
class="space-y-6 mt-6">

</div>

</div>

</div>

<!-- FOOTER -->

<div
class="border-t border-stone-900 pt-4
flex justify-between
text-[11px]
uppercase
tracking-wider
text-stone-500">

<span>Cebu City, Philippines</span>

<span>All prices VAT inclusive</span>

<span>Powered by YourBrand Solutions</span>

</div>

</div>

<script>

function renderMessage(msg){

document.getElementById("category-1-items").innerHTML =
`<div class="text-stone-500">${msg}</div>`;

document.getElementById("category-2-items").innerHTML =
"";

}

async function fetchMenu(){

try{

const controller =
new AbortController();

const timeout =
setTimeout(
()=>controller.abort(),
10000
);

const response =
await fetch(
`${TSV_URL}&t=${Date.now()}`,
{
signal: controller.signal
}
);

clearTimeout(timeout);

if(!response.ok){

throw new Error(
`HTTP ${response.status}`
);

}

const text =
await response.text();

parseAndRender(text);

}
catch(error){

console.error(error);

renderMessage(
"Unable to load menu."
);

}

}

function parseAndRender(tsv){

const rows =
tsv
.trim()
.split("\n")
.slice(1);

const items=[];

rows.forEach(row=>{

const cols =
row
.split("\t")
.map(v=>v.trim());

if(cols.length<5)
return;

items.push({

category:
cols[0],

name:
cols[1],

description:
cols[2],

price:
cols[3],

soldOut:
cols[4]
.toLowerCase()==="true"

});

});

if(items.length===0){

renderMessage(
"No menu available"
);

return;

}

const categories =
[
...new Set(
items.map(
x=>x.category
)
)
];

document.getElementById(
"cat-title-1"
).textContent =
categories[0] || "";

document.getElementById(
"cat-title-2"
).textContent =
categories[1] || "";

const left =
document.getElementById(
"category-1-items"
);

const right =
document.getElementById(
"category-2-items"
);

left.innerHTML="";
right.innerHTML="";

items.forEach(item=>{

const html=
`
<div class="relative flex items-start min-h-[60px]">

<div class="max-w-[70%]">

<div class="font-semibold text-lg">

${item.name}

</div>

<div class="text-xs text-stone-400 mt-1">

${item.description}

</div>

</div>

<div
class="flex-1 border-b border-dotted border-stone-800 mx-3 mt-4">
</div>

<div
class="font-serif text-xl">

₱${item.price}

</div>

${
item.soldOut
?

`
<div
class="absolute inset-0
bg-black/90
flex items-center justify-center">

<div
class="border
border-red-500
text-red-500
px-3 py-1
text-xs
tracking-widest">

OUT OF STOCK

</div>

</div>
`

:

""

}

</div>
`;

if(
item.category===categories[0]
){

left.innerHTML+=html;

}
else{

right.innerHTML+=html;

}

});

}

fetchMenu();

setInterval(
fetchMenu,
REFRESH_INTERVAL
);

</script>

</body>
</html>
