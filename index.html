<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Menu Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .font-sans { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#111] text-stone-100 font-sans min-h-screen flex items-center justify-center overflow-hidden">

    <script>
        // REPLACE THIS WITH YOUR ACTUAL GOOGLE SHEET ID
        const SHEET_ID = 'e/2PACX-1vTdctD1zk3cv8cjGUJIk6tMUG91vdsveUXPtQz8cMqB-W5lyipJFc286R1VuNpps05_nLSNerE3x-TF';
        const TSV_URL = 'https://docs.google.com/spreadsheets/d/${SHEET_ID}/pub?output=tsv';
    </script>

    <!-- TV Container (Simulates a clean 1080p layout) -->
    <div class="w-screen h-screen bg-[#0d0d0c] p-12 flex flex-col justify-between relative">
        
        <!-- Header -->
        <div class="text-center mb-4">
            <h1 id="menu-title" class="font-serif text-6xl tracking-widest text-[#f5f5f4] uppercase font-semibold">Aura Artisanal</h1>
            <p class="text-xs uppercase tracking-[0.3em] text-amber-500 font-semibold mt-2">Sip &bull; Savor &bull; Gather</p>
            <div class="w-24 h-[1px] bg-amber-500/50 mx-auto mt-4"></div>
        </div>

        <!-- Main Categories Grid -->
        <div class="grid grid-cols-2 gap-x-16 gap-y-8 my-auto px-6">
            
            <!-- Category 1: Left Side -->
            <div class="space-y-6">
                <h2 id="cat-title-1" class="font-serif text-3xl text-amber-500/90 border-b border-stone-800 pb-2 italic">Beverages</h2>
                <div id="category-1-items" class="space-y-6">
                    <!-- Dynamic items loaded here -->
                    <div class="animate-pulse flex space-x-4">
                        <div class="flex-1 space-y-4 py-1"><div class="h-4 bg-stone-800 rounded"></div></div>
                    </div>
                </div>
            </div>

            <!-- Category 2: Right Side -->
            <div class="space-y-6">
                <h2 id="cat-title-2" class="font-serif text-3xl text-amber-500/90 border-b border-stone-800 pb-2 italic">Pastries & Eats</h2>
                <div id="category-2-items" class="space-y-6">
                    <!-- Dynamic items loaded here -->
                    <div class="animate-pulse flex space-x-4">
                        <div class="flex-1 space-y-4 py-1"><div class="h-4 bg-stone-800 rounded"></div></div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="flex justify-between items-center text-[11px] text-stone-500 tracking-wider uppercase border-t border-stone-900 pt-4">
            <span>Cebu City, Philippines</span>
            <span>All prices are VAT-inclusive</span>
            <span>Powered by YourBrand Solutions</span>
        </div>
    </div>

    <!-- Live Data Fetching & Rendering Script -->
    <script>
        async function fetchMenu() {
            try {
                // Add a cache-busting timestamp to force live updates
                const response = await fetch(`${TSV_URL}&timestamp=${new Date().getTime()}`);
                if (!response.ok) throw new Error('Failed to fetch sheet data.');
                
                const data = await response.text();
                parseAndRender(data);
            } catch (error) {
                console.error("Database connection failed:", error);
            }
        }

        function parseAndRender(tsvText) {
            const lines = tsvText.split('\n');
            const items = [];

            // Skip header (Row 1), loop through rows
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].split('\t');
                
                if (cols.length >= 5) {
                    items.push({
                        category: cols[0].trim(),
                        name: cols[1].trim(),
                        description: cols[2].trim(),
                        price: cols[3].trim(),
                        soldOut: cols[4].trim().toLowerCase() === 'true'
                    });
                }
            }

            // Get unique category names from our database entries
            const categories = [...new Set(items.map(item => item.category))];
            
            // Render Categories
            if (categories[0]) document.getElementById('cat-title-1').innerText = categories[0];
            if (categories[1]) document.getElementById('cat-title-2').innerText = categories[1];

            const cat1Container = document.getElementById('category-1-items');
            const cat2Container = document.getElementById('category-2-items');

            cat1Container.innerHTML = '';
            cat2Container.innerHTML = '';

            items.forEach(item => {
                const itemHTML = `
                    <div class="flex justify-between items-baseline relative min-h-[50px] transition-opacity duration-300">
                        <div class="pr-4 max-w-[70%]">
                            <h4 class="font-sans font-semibold text-lg text-stone-200">${item.name}</h4>
                            <p class="text-xs text-stone-400 mt-0.5 leading-relaxed">${item.description}</p>
                        </div>
                        <span class="flex-grow border-b border-dotted border-stone-800 mx-2"></span>
                        <span class="font-serif font-semibold text-xl text-stone-100">₱${item.price}</span>
                        
                        ${item.soldOut ? `
                        <div class="absolute inset-0 bg-[#0d0d0c]/90 flex items-center justify-center">
                            <span class="border border-red-500 text-red-500 font-bold tracking-widest text-[10px] px-2 py-0.5 rounded rotate-[-2deg]">
                                OUT OF STOCK
                            </span>
                        </div>
                        ` : ''}
                    </div>
                `;

                if (item.category === categories[0]) {
                    cat1Container.innerHTML += itemHTML;
                } else {
                    cat2Container.innerHTML += itemHTML;
                }
            });
        }

        // Fetch once on page load
        fetchMenu();

        // Check for updates every 30 seconds (30000ms)
        setInterval(fetchMenu, 30000);
    </script>
</body>
</html>
